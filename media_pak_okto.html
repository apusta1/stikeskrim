<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Aktivitas 3D: Kubus & Balok (Pro Mode)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            touch-action: none; /* Mencegah default gesture browser mobile */
        }
        
        /* Panel kontrol utama */
        .control-panel {
            position: absolute;
            bottom: 15px;
            left: 10px;
            right: 10px;
            background: rgba(25, 30, 40, 0.94);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 0;
            color: white;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.25);
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            pointer-events: auto;
            overflow: hidden;
        }
        
        /* Header panel */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .panel-header h3 {
            margin: 0;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .toggle-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.4); }
        
        /* Konten panel */
        .panel-content {
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 55vh;
            overflow-y: auto;
        }
        .panel-content.collapsed { display: none; }
        
        /* Baris Pengaturan */
        .panel-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(0,0,0,0.4);
            padding: 8px 12px;
            border-radius: 14px;
            flex: 1;
            min-width: 140px;
        }
        .control-group label {
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #bbb;
            text-transform: uppercase;
        }
        
        /* Gaya Pilihan Mode Alat (Radio group bergaya kancing) */
        .mode-selector {
            display: flex;
            gap: 5px;
            width: 100%;
        }
        .mode-btn {
            flex: 1;
            background: #2c3e50;
            border: 2px solid transparent;
            padding: 10px 5px;
            border-radius: 12px;
            color: #afbfc0;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .mode-btn.active {
            color: white;
            border-color: #ffffff;
        }
        .mode-btn#modeSalin.active { background: #2ecc71; }
        .mode-btn#modeRotasi.active { background: #9b59b6; }
        .mode-btn#modeHapus.active { background: #e74c3c; }
        
        input, button {
            background: #1e2f3a;
            border: none;
            padding: 10px 14px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s ease;
        }
        input {
            background: #0f1a22;
            cursor: text;
            width: 50px;
            text-align: center;
        }
        
        /* Warna Aksen Tombol */
        .btn-kubus { background: #27ae60; }
        .btn-balok { background: #2980b9; }
        .btn-action { background: #f39c12; font-size: 12px; padding: 8px 12px; }
        .btn-reset-all { background: #7f8c8d; font-size: 12px; padding: 8px 12px; }
        
        button:active, .mode-btn:active { transform: scale(0.97); }
        
        /* Status di atas */
        #status {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            background: rgba(10, 10, 30, 0.85);
            padding: 8px 14px;
            border-radius: 20px;
            color: #eee;
            font-size: 11px;
            pointer-events: none;
            z-index: 15;
            backdrop-filter: blur(5px);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .instruction { font-size: 11px; color: #bbb; font-weight: normal; }
        .balok-inputs { display: flex; gap: 5px; justify-content: space-between; }
        .balok-inputs input { flex: 1; min-width: 35px; }

        @media (min-width: 768px) {
            .control-panel { left: 20px; right: 20px; bottom: 20px; }
            .panel-header h3 { flex-direction: row; gap: 15px; align-items: center; font-size: 1.1rem; }
            .panel-content { gap: 15px; }
            .panel-row { flex-wrap: nowrap; }
            .control-group { flex: none; min-width: 160px; }
            .mode-selector { width: auto; min-width: 400px; }
            input { width: 70px; }
        }
    </style>
</head>
<body>
    <div id="status">✨ Memuat ruang geometri...</div>
    
    <div class="control-panel" id="mainPanel">
        <div class="panel-header" id="panelHeader">
            <h3>
                <span>🧩 Panel Kontrol Interaktif</span>
                <span class="instruction">💡 Pilih mode alat di bawah untuk mengubah aksi klik/sentuhan objek</span>
            </h3>
            <button class="toggle-btn" id="togglePanelBtn">▼ Sembunyikan</button>
        </div>
        
        <div class="panel-content" id="panelContent">
            <div class="panel-row">
                <div class="control-group" style="flex: 2;">
                    <label>🛠️ Pilihan Mode Alat Aktif</label>
                    <div class="mode-selector">
                        <div id="modeSalin" class="mode-btn active">🌿 Salin / Tempel<br><span style="font-size:9px;font-weight:normal;">Double-tap sisi</span></div>
                        <div id="modeRotasi" class="mode-btn">🔄 Mode Rotasi<br><span style="font-size:9px;font-weight:normal;">Ubah putaran objek</span></div>
                        <div id="modeHapus" class="mode-btn">🗑️ Mode Hapus<br><span style="font-size:9px;font-weight:normal;">Double-tap lenyap</span></div>
                    </div>
                </div>
                <div class="control-group" id="subPanelRotasi" style="display: none; justify-content: center;">
                    <label>⚙️ Kontrol Rotasi</label>
                    <button id="btnResetRotasi" class="btn-action">↩️ Reset Rotasi Objek</button>
                </div>
            </div>
            
            <div class="panel-row">
                <div class="control-group">
                    <label>➕ KUBUS SATUAN</label>
                    <button id="btnTambahKubus" class="btn-kubus">+ Kubus (1x1x1)</button>
                </div>
                <div class="control-group" style="flex: 2;">
                    <label>📦 BALOK KUSTOM (P x T x L)</label>
                    <div class="balok-inputs">
                        <input type="number" id="panjangX" value="2" step="0.5" min="0.5" max="5" title="Panjang (X)">
                        <input type="number" id="panjangY" value="1" step="0.5" min="0.5" max="5" title="Tinggi (Y)">
                        <input type="number" id="panjangZ" value="1" step="0.5" min="0.5" max="5" title="Lebar (Z)">
                        <button id="btnTambahBalok" class="btn-balok">+ Tambah Balok</button>
                    </div>
                </div>
                <div class="control-group" style="flex: none; min-width: 90px; justify-content: center;">
                    <label>🗑️ RUANG</label>
                    <button id="btnReset" class="btn-reset-all">Reset All</button>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Variabel State Aplikasi ---
        let currentMode = 'salin'; // Pilihan: 'salin', 'rotasi', 'hapus'
        let objectsList = [];
        let currentAttachedObject = null;

        // --- Setup Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.01);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- OrbitControls (Kamera) ---
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.target.set(0, 1, 0);
        
        // --- TransformControls (Gizmo) ---
        const transformControls = new TransformControls(camera, renderer.domElement);
        
        // Optimasi ketebalan/ukuran gizmo di mobile layar sentuh
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        transformControls.setSize(isMobile ? 1.3 : 1.0);

        transformControls.addEventListener('dragging-changed', function (event) {
            orbitControls.enabled = !event.value;
        });
        scene.add(transformControls);
        
        // --- Pencahayaan ---
        const ambientLight = new THREE.AmbientLight(0x505070);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(6, 12, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x5588aa, 0.5);
        fillLight.position.set(3, 5, 4);
        scene.add(fillLight);
        
        // Grid & Lantai dasar
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x446688);
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x112244, roughness: 0.6 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.01;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- Fungsi Manajemen Seleksi Objek ---
        function detachTransformControls() {
            if (currentAttachedObject) {
                transformControls.detach();
                currentAttachedObject = null;
            }
        }
        
        function attachToObject(mesh) {
            detachTransformControls();
            
            // Sesuaikan jenis tipe gizmo dengan mode alat yang sedang aktif
            if (currentMode === 'rotasi') {
                transformControls.setMode('rotate');
            } else {
                transformControls.setMode('translate');
            }
            
            transformControls.attach(mesh);
            currentAttachedObject = mesh;
        }
        
        function randomColor() {
            return new THREE.Color().setHSL(Math.random(), 0.8, 0.55);
        }
        
        // --- Konstruktor Pembuatan Kubus/Balok ---
        function buatMeshBox(w, h, d, posisi = null) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ 
                color: randomColor(), 
                roughness: 0.3, 
                metalness: 0.1 
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Simpan ukuran murni objek demi pembacaan kalkulasi nempel sisi
            mesh.userData = { w: w, h: h, d: d };
            
            if (posisi) {
                mesh.position.copy(posisi);
            } else {
                mesh.position.set((Math.random() - 0.5) * 4, h / 2, (Math.random() - 0.5) * 4);
            }
            
            scene.add(mesh);
            objectsList.push(mesh);
            attachToObject(mesh);
            return mesh;
        }

        // --- ENGINE INTERAKSI: Klik & Double-Tap Alur Multi-Mode ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function eksekusiAksiObjek(clientX, clientY, isDoubleClick = false) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objectsList);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                const objekTarget = hit.object;
                
                // --- 1. JIKA KLIK/TAP TUNGGAL (Pilih Objek) ---
                if (!isDoubleClick) {
                    if (currentMode !== 'hapus') {
                        attachToObject(objekTarget);
                    } else {
                        // Di mode hapus, klik tunggal langsung menyeleksi tipis sebagai penanda sasaran hapus
                        currentAttachedObject = objekTarget;
                        transformControls.detach();
                    }
                    return;
                }
                
                // --- 2. JIKA DOUBLE-CLICK / DOUBLE-TAP TERDETEKSI ---
                
                // A. MODE HAPUS
                if (currentMode === 'hapus') {
                    detachTransformControls();
                    scene.remove(objekTarget);
                    objekTarget.geometry.dispose();
                    objekTarget.material.dispose();
                    objectsList = objectsList.filter(item => item !== objekTarget);
                    return;
                }
                
                // B. MODE ROTASI (Double click pada mode rotasi diprogram mengembalikan ke rotasi awal)
                if (currentMode === 'rotasi') {
                    objekTarget.rotation.set(0, 0, 0);
                    return;
                }
                
                // C. MODE SALIN / TEMPEL (Sisi Snap Kloning)
                if (currentMode === 'salin') {
                    const normalSisi = hit.face.normal.clone();
                    // Konversi arah orientasi lokal sisi mengikuti rotasi objek dunia nyata
                    normalSisi.transformDirection(objekTarget.matrixWorld);
                    
                    const w = objekTarget.userData.w;
                    const h = objekTarget.userData.h;
                    const d = objekTarget.userData.d;
                    
                    const posisiBaru = objekTarget.position.clone();
                    
                    // Ambil arah penempelan berdasarkan batas ketebalan sumbunya masing-masing
                    if (Math.abs(normalSisi.x) > 0.8) posisiBaru.x += normalSisi.x * w; 
                    else if (Math.abs(normalSisi.y) > 0.8) posisiBaru.y += normalSisi.y * h;
                    else if (Math.abs(normalSisi.z) > 0.8) posisiBaru.z += normalSisi.z * d;
                    
                    if (posisiBaru.y < h/2) posisiBaru.y = h/2; // Cegah amblas di bawah grid lantai
                    
                    buatMeshBox(w, h, d, posisiBaru);
                }
                
            } else {
                // Sentuhan di ruang kosong lepas kontrol jika tidak sedang menyeret sumbu gizmo
                if (!transformControls.dragging) {
                    detachTransformControls();
                }
            }
        }
        
        // --- Event Listener Pendeteksi Desktop & Layar Sentuh Mobile ---
        let lastTapTime = 0;
        let touchStartX = 0;
        let touchStartY = 0;

        // Desktop Mouse Click
        renderer.domElement.addEventListener('click', (e) => {
            eksekusiAksiObjek(e.clientX, e.clientY, false);
        });
        renderer.domElement.addEventListener('dblclick', (e) => {
            eksekusiAksiObjek(e.clientX, e.clientY, true);
        });

        // Mobile Screen Tap Polyfill
        renderer.domElement.addEventListener('touchstart', (e) => {
            if(e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        }, {passive: true});

        renderer.domElement.addEventListener('touchend', (e) => {
            if (e.changedTouches.length === 1) {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                // Batasi ambang toleransi gerakan pergeseran kamera agar tidak disalahartikan sebagai ketukan jari
                if (Math.abs(touchEndX - touchStartX) < 6 && Math.abs(touchEndY - touchStartY) < 6) {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTapTime;
                    
                    if (tapLength < 300 && tapLength > 0) {
                        eksekusiAksiObjek(touchEndX, touchEndY, true);
                        e.preventDefault();
                    } else {
                        eksekusiAksiObjek(touchEndX, touchEndY, false);
                    }
                    lastTapTime = currentTime;
                }
            }
        }, {passive: false});

        // --- Sistem Manajemen Alihan Mode Kontrol Panel ---
        const btnSalin = document.getElementById('modeSalin');
        const btnRotasi = document.getElementById('modeRotasi');
        const btnHapus = document.getElementById('modeHapus');
        const subPanelRotasi = document.getElementById('subPanelRotasi');
        
        function gantiModeAlat(modeTerpilih) {
            currentMode = modeTerpilih;
            
            // Perbarui visual status tombol active
            btnSalin.classList.remove('active');
            btnRotasi.classList.remove('active');
            btnHapus.classList.remove('active');
            
            subPanelRotasi.style.display = "none";
            
            if (modeTerpilih === 'salin') {
                btnSalin.classList.add('active');
                if (currentAttachedObject) transformControls.setMode('translate');
            } else if (modeTerpilih === 'rotasi') {
                btnRotasi.classList.add('active');
                subPanelRotasi.style.display = "flex";
                if (currentAttachedObject) transformControls.setMode('rotate');
            } else if (modeTerpilih === 'hapus') {
                btnHapus.classList.add('active');
                detachTransformControls(); // Sembunyikan gizmo saat mode eliminasi objek aktif
            }
        }
        
        btnSalin.addEventListener('click', () => gantiModeAlat('salin'));
        btnRotasi.addEventListener('click', () => gantiModeAlat('rotasi'));
        btnHapus.addEventListener('click', () => gantiModeAlat('hapus'));
        
        // Aksi Tombol Reset Rotasi khusus objek terpilih
        document.getElementById('btnResetRotasi').addEventListener('click', () => {
            if (currentAttachedObject) {
                currentAttachedObject.rotation.set(0, 0, 0);
            } else {
                alert("Silakan ketuk objek yang ingin di-reset rotasinya terlebih dahulu!");
            }
        });

        // --- Aksi Tombol Pembuatan & Pengosongan Ruang ---
        document.getElementById('btnTambahKubus').addEventListener('click', () => {
            buatMeshBox(1, 1, 1);
        });
        
        document.getElementById('btnTambahBalok').addEventListener('click', () => {
            const xVal = parseFloat(document.getElementById('panjangX').value) || 1;
            const yVal = parseFloat(document.getElementById('panjangY').value) || 1;
            const zVal = parseFloat(document.getElementById('panjangZ').value) || 1;
            buatMeshBox(xVal, yVal, zVal);
        });
        
        document.getElementById('btnReset').addEventListener('click', () => {
            if(confirm("Apakah Anda yakin ingin menghapus semua susunan bangun ruang?")) {
                detachTransformControls();
                objectsList.forEach(mesh => {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                });
                objectsList = [];
            }
        });
        
        // Fitur Meminimalkan Panel Kontrol
        const panelContentDiv = document.getElementById('panelContent');
        const toggleBtn = document.getElementById('togglePanelBtn');
        let panelCollapsed = false;
        
        toggleBtn.addEventListener('click', () => {
            panelCollapsed = !panelCollapsed;
            if (panelCollapsed) {
                panelContentDiv.classList.add('collapsed');
                toggleBtn.innerHTML = '▲ Tampilkan';
            } else {
                panelContentDiv.classList.remove('collapsed');
                toggleBtn.innerHTML = '▼ Sembunyikan';
            }
        });
        
        // --- Loop Animasi Utama ---
        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // --- Pengendali Ukuran Jendela Otomatis ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Teks Informasi Petunjuk Dinamis (Status Bar)
        const statusDiv = document.getElementById('status');
        setInterval(() => {
            const count = objectsList.length;
            if (count === 0) {
                statusDiv.innerHTML = '✨ Ruang Kosong. Tambahkan objek kubus/balok dari menu panel di bawah untuk memulai.';
            } else {
                let pesanPanduan = '';
                if (currentMode === 'salin') {
                    pesanPanduan = '🌿 <b>Mode Salin Aktif:</b> Double-click/tap sisi objek untuk menempelkan duplikatnya.';
                } else if (currentMode === 'rotasi') {
                    pesanPanduan = '🔄 <b>Mode Rotasi Aktif:</b> Gunakan cincin gizmo melingkar atau double-click objek untuk kembali tegak.';
                } else if (currentMode === 'hapus') {
                    pesanPanduan = '🗑️ <b>Mode Hapus Aktif:</b> Hati-hati! <b>Double-click/tap objek</b> akan melenyapkannya dari ruang.';
                }
                statusDiv.innerHTML = `📦 Jml: <b>${count} Objek</b> | ${pesanPanduan}`;
            }
        }, 350);
    </script>
</body>
</html>
