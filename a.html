<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Belajar Menulis Huruf a</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fef9f0;
            font-family: 'Segoe UI', Arial, sans-serif;
            /* PERBAIKAN 1: Hapus touch-action: none dari body */
            padding: 20px 16px;
            overflow-y: auto;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #d97706;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #78716c;
            margin-bottom: 18px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: min(340px, 85vw);
            height: min(340px, 85vw);
            max-width: 340px;
            max-height: 340px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(217,119,6,0.13), 0 2px 8px rgba(0,0,0,0.07);
            border: 2.5px solid #fde68a;
        }

        #tracing-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 26px;
            /* PERBAIKAN 1: touch-action hanya di SVG */
            touch-action: none;
        }

        /* Ghost letter background */
        .letter-ghost {
            font-size: 260px;
            font-family: 'Georgia', 'Times New Roman', serif;
            fill: #fef3c7;
            font-style: italic;
        }

        /* Guide path (grey outline) */
        .bg-path {
            fill: none;
            stroke: #e5e7eb;
            stroke-width: 36;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Arrow/dot indicators */
        .start-dot {
            fill: #fbbf24;
            opacity: 0.9;
        }
        
        /* PERBAIKAN 2: Area sentuh lebih besar - layer transparan di atas path */
        .touch-area {
            fill: none;
            stroke: transparent;
            stroke-width: 68;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: stroke;
            cursor: pointer;
        }

        /* Active drawn path */
        .trace-path {
            fill: none;
            stroke: #f59e0b;
            stroke-width: 28;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        /* Progress bar */
        #progress-bar-wrap {
            margin-top: 18px;
            width: min(340px, 85vw);
            max-width: 340px;
            height: 10px;
            background: #fde68a;
            border-radius: 99px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 99px;
            transition: width 0.1s linear;
        }

        #btn-reset {
            margin-top: 16px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(245,158,11,0.3);
            transition: background 0.2s, transform 0.1s;
            /* PERBAIKAN 3: Tombol lebih besar untuk mobile */
            min-height: 48px;
            min-width: 140px;
        }

        #btn-reset:hover { background: #d97706; }
        #btn-reset:active { transform: scale(0.97); }

        #success-msg {
            display: none;
            font-size: 22px;
            font-weight: 700;
            color: #16a34a;
            margin-top: 14px;
            animation: popIn 0.4s cubic-bezier(.36,1.56,.64,1) both;
            text-align: center;
        }
        
        #voice-status {
            font-size: 11px;
            color: #a8a29e;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .voice-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #d4d4d8;
            display: inline-block;
        }
        
        .voice-dot.active {
            background-color: #22c55e;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        
        /* PERBAIKAN 2: Feedback haptic untuk sentuhan */
        @media (hover: none) and (pointer: coarse) {
            .touch-area:active {
                cursor: grabbing;
            }
        }
    </style>
</head>
<body>

<p class="title">✏️ Belajar Menulis Huruf</p>
<p class="subtitle">Ikuti jejak untuk menulis huruf <strong>a</strong></p>

<div id="canvas-container">
    <svg id="tracing-svg" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">

        <!-- Ghost letter for visual context -->
        <text class="letter-ghost" x="40" y="295">a</text>

        <!--
            PATH untuk huruf 'ɑ' (open-tail a)
            Titik awal: kanan tengah lingkaran (~222, 148)
        -->
        <path id="bg-path" class="bg-path"
            d="M 222,148
               C 222,105  160,80   118,105
               C  76,130   76,210  118,232
               C 160,254  222,230  222,190
               L 222,232"
        />
        
        <!-- PERBAIKAN 2: Area sentuh yang lebih besar (transparan, stroke lebih tebal) -->
        <path id="touch-area" class="touch-area"
            d="M 222,148
               C 222,105  160,80   118,105
               C  76,130   76,210  118,232
               C 160,254  222,230  222,190
               L 222,232"
        />

        <!-- Dot penanda titik mulai -->
        <circle class="start-dot" cx="222" cy="148" r="13"/>
        <text x="222" y="153" text-anchor="middle" font-size="13" font-weight="bold" fill="white" pointer-events="none">1</text>

        <!-- Trace path (drawn progressively) -->
        <path id="active-path" class="trace-path"
            d="M 222,148
               C 222,105  160,80   118,105
               C  76,130   76,210  118,232
               C 160,254  222,230  222,190
               L 222,232"
        />

        <!-- Hand guide -->
        <text id="hand-guide" font-size="34" text-anchor="middle"
              dominant-baseline="middle" pointer-events="none"
              x="222" y="148">👆</text>
    </svg>
</div>

<div id="progress-bar-wrap">
    <div id="progress-bar"></div>
</div>

<div id="success-msg">🎉 Hebat! Kamu berhasil!</div>

<button id="btn-reset">🔄 Coba Lagi</button>

<!-- PERBAIKAN 3: Indikator status suara -->
<div id="voice-status">
    <span class="voice-dot" id="voice-dot"></span>
    <span id="voice-text">Suara siap</span>
</div>

<script>
    const activePath  = document.getElementById('active-path');
    const bgPath      = document.getElementById('bg-path');
    const touchArea   = document.getElementById('touch-area');  // PERBAIKAN 2
    const svg         = document.getElementById('tracing-svg');
    const handGuide   = document.getElementById('hand-guide');
    const btnReset    = document.getElementById('btn-reset');
    const progressBar = document.getElementById('progress-bar');
    const successMsg  = document.getElementById('success-msg');
    const container   = document.getElementById('canvas-container');
    const voiceDot    = document.getElementById('voice-dot');
    const voiceText   = document.getElementById('voice-text');

    // ── Path metrics ──────────────────────────────────────────────
    const pathLength = activePath.getTotalLength();
    activePath.style.strokeDasharray  = pathLength;
    activePath.style.strokeDashoffset = pathLength;

    let currentProgress = 0;
    let isDrawing       = false;
    let completed       = false;
    
    // PERBAIKAN 3: Inisialisasi SpeechSynthesis dengan interaksi pengguna
    let speechReady = false;
    let pendingSpeech = null;
    
    function initSpeech() {
        if (speechReady) return;
        if (!('speechSynthesis' in window)) {
            voiceText.textContent = 'Suara tidak didukung';
            voiceDot.style.opacity = '0.5';
            return;
        }
        
        // Coba inisialisasi dengan utterance kosong
        const testUtterance = new SpeechSynthesisUtterance('');
        testUtterance.lang = 'id-ID';
        
        speechReady = true;
        voiceDot.classList.add('active');
        voiceText.textContent = 'Suara siap ✅';
        
        // Jika ada suara yang tertunda, mainkan
        if (pendingSpeech) {
            playSoundA();
            pendingSpeech = null;
        }
    }
    
    // Panggil initSpeech saat user pertama kali touch/mouse di area gambar
    function ensureSpeechReady() {
        if (!speechReady) {
            initSpeech();
        }
    }

    function playSoundA() {
        if (!('speechSynthesis' in window)) return;
        
        // PERBAIKAN 3: Coba inisialisasi jika belum
        if (!speechReady) {
            pendingSpeech = true;
            return;
        }
        
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('a');
        u.lang = 'id-ID';
        u.rate = 0.75;
        u.pitch = 1.1;
        u.volume = 1;
        
        // Untuk mobile, pastikan utterance selesai dengan baik
        u.onerror = function(e) {
            console.log('Speech error, retrying...');
            setTimeout(() => {
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(u);
            }, 100);
        };
        
        window.speechSynthesis.speak(u);
    }

    // ── Hand guide animation ──────────────────────────────────────
    const GUIDE_DURATION = 3000;
    const GUIDE_FADE_END = 0.85;
    let guideStart = null;
    let guideVisible = true;

    function animateHand(ts) {
        if (!guideVisible) return;
        if (!guideStart) guideStart = ts;
        const elapsed  = (ts - guideStart) % GUIDE_DURATION;
        const fraction = elapsed / GUIDE_DURATION;

        const pt = activePath.getPointAtLength(fraction * pathLength);
        handGuide.setAttribute('x', pt.x );
        handGuide.setAttribute('y', pt.y + 10);

        if (fraction > GUIDE_FADE_END) {
            handGuide.style.opacity = 1 - (fraction - GUIDE_FADE_END) / (1 - GUIDE_FADE_END);
        } else if (fraction < 0.04) {
            handGuide.style.opacity = fraction / 0.04;
        } else {
            handGuide.style.opacity = 1;
        }

        requestAnimationFrame(animateHand);
    }
    requestAnimationFrame(animateHand);

    // ── Drawing progress ──────────────────────────────────────────
    function updatePathDrawing() {
        activePath.style.strokeDashoffset = pathLength * (1 - currentProgress);
        progressBar.style.width = (currentProgress * 100) + '%';
    }

    // ── Coordinate helper: screen → SVG viewBox ───────────────────
    function getSVGCoords(e) {
        const rect = svg.getBoundingClientRect();
        let clientX, clientY;
        
        if (e.touches) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        
        return {
            x: ((clientX - rect.left) / rect.width) * 340,
            y: ((clientY - rect.top) / rect.height) * 340
        };
    }

    // ── Tracing logic ─────────────────────────────────────────────
    const TOLERANCE   = 48;   // PERBAIKAN 2: Sedikit dinaikkan untuk anak-anak
    const MAX_JUMP    = 0.15;

    function checkTracing(e) {
        if (!isDrawing || completed) return;
        
        // PERBAIKAN 3: Inisialisasi speech saat mulai menggambar
        ensureSpeechReady();
        
        const { x, y } = getSVGCoords(e);
        const anchorLen = currentProgress * pathLength;
        const searchLen = Math.min(pathLength, anchorLen + MAX_JUMP * pathLength);
        const steps     = 40; // PERBAIKAN 2: Lebih banyak steps untuk akurasi
        let   bestLen   = -1;
        let   bestDist  = Infinity;

        for (let i = 0; i <= steps; i++) {
            const testLen   = anchorLen + (searchLen - anchorLen) * (i / steps);
            const pt        = activePath.getPointAtLength(testLen);
            const dist      = Math.hypot(x - pt.x, y - pt.y);
            if (dist < bestDist) { bestDist = dist; bestLen = testLen; }
        }

        if (bestDist <= TOLERANCE && bestLen > anchorLen) {
            currentProgress = bestLen / pathLength;
            updatePathDrawing();
            
            // Sembunyikan guide saat mulai menggambar
            if (guideVisible && currentProgress > 0.02) {
                guideVisible = false;
                handGuide.style.opacity = '0';
            }
            
            // PERBAIKAN 2: Haptic feedback ringan (jika didukung)
            if (navigator.vibrate && currentProgress > 0 && Math.floor(currentProgress * 10) !== Math.floor((currentProgress - 0.01) * 10)) {
                navigator.vibrate(8);
            }
        }

        if (currentProgress >= 0.95 && !completed) {
            currentProgress = 1.0;
            updatePathDrawing();
            completed  = true;
            isDrawing  = false;
            handleSuccess();
        }
    }

    // ── Success ───────────────────────────────────────────────────
    function handleSuccess() {
        playSoundA();
        
        // Haptic feedback sukses
        if (navigator.vibrate) {
            navigator.vibrate([50, 100, 50]);
        }

        confetti({ particleCount: 160, spread: 90, origin: { y: 0.55 },
                   colors: ['#fbbf24','#f59e0b','#10b981','#3b82f6','#ec4899'] });
        setTimeout(() => confetti({
            particleCount: 80, angle: 60, spread: 55, origin: { x: 0 }
        }), 250);
        setTimeout(() => confetti({
            particleCount: 80, angle: 120, spread: 55, origin: { x: 1 }
        }), 400);

        successMsg.style.display = 'block';
    }

    // ── Event listeners ───────────────────────────────────────────
    // PERBAIKAN 1 & 2: Gunakan touch-area untuk event, lebih responsif
    const eventTarget = touchArea;
    
    function startDraw(e) {
        e.preventDefault();
        isDrawing = true;
        ensureSpeechReady();  // PERBAIKAN 3
        checkTracing(e);
    }
    
    function endDraw() {
        isDrawing = false;
    }
    
    // Mouse events
    eventTarget.addEventListener('mousedown', startDraw);
    window.addEventListener('mouseup', endDraw);
    eventTarget.addEventListener('mousemove', checkTracing);
    
    // Touch events
    eventTarget.addEventListener('touchstart', startDraw, { passive: false });
    window.addEventListener('touchend', endDraw);
    eventTarget.addEventListener('touchmove', checkTracing, { passive: false });
    
    // PERBAIKAN 3: Inisialisasi speech saat tombol reset disentuh
    btnReset.addEventListener('click', () => {
        ensureSpeechReady();
        
        currentProgress = 0;
        completed       = false;
        isDrawing       = false;
        updatePathDrawing();
        guideVisible        = true;
        guideStart          = null;
        handGuide.style.opacity = '1';
        requestAnimationFrame(animateHand);
        successMsg.style.display  = 'none';
    });
    
    // PERBAIKAN 3: Inisialisasi speech dengan tap pertama di mana saja
    document.body.addEventListener('touchstart', ensureSpeechReady, { once: true });
    document.body.addEventListener('mousedown', ensureSpeechReady, { once: true });
    
    // Inisialisasi awal
    updatePathDrawing();
</script>
</body>
</html>
