<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blok Nilai Tempat - Representasi Dua Desimal</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; min-height: 100vh;
            background: linear-gradient(145deg, #2c6e5c 0%, #1e5a48 100%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px;
        }
        .canvas-wrapper {
            background: #fef3da; border-radius: 64px; padding: 20px;
            box-shadow: 0 30px 35px rgba(0, 0, 0, 0.3);
        }
        canvas { display: block; 
                margin: 0 auto; 
                border-radius: 48px; 
                cursor: grab;
                touch-action: none; 
                max-width: 100%; /* Agar tidak meluap keluar layar HP */
                height: auto;    /* Menjaga rasio */
               }
        .info-panel {
            text-align: center; margin-top: 18px; font-size: 1rem; font-weight: bold;
            background: #e9f5e1; display: inline-block; padding: 6px 20px;
            border-radius: 50px; color: #2d3e2b;
        }
        footer { text-align: center; margin-top: 16px; font-size: 0.8rem; color: #f7e3af; }
    </style>
</head>
<body>
<div>
    <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
        <div class="info-panel">📦 Tarik blok ke tabel sesuai nilai tempatnya.</div>
        <div class="info-panel">🇮🇩 Format Indonesia (Koma Desimal)</div>
    </div>
    <footer>Gunakan tombol di atas/bawah untuk manipulasi data.</footer>
</div>

<script>
(function() {
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1200; canvas.height = 800;

    const images = {};
    let loadedImages = 0;
    const sources = {
        puluhan: 'puluhan.png',
        satuan: 'satuan.png',
        persepuluh: 'sepersepuluh.png',
        perseratus: 'seperseratus.png'
    };

    for (let key in sources) {
        images[key] = new Image();
        images[key].src = sources[key];
        images[key].onload = () => { if (++loadedImages === 4) init(); };
    }

    function drawImg(ctx, imgKey, x, y, w, h) {
        if (images[imgKey]) ctx.drawImage(images[imgKey], x, y, w, h);
    }

    const placeColumns = {
        tens_place:    { x: 100, y: 240, w: 195, h: 240, label: "PULUHAN" },
        ones_place:    { x: 349, y: 240, w: 195, h: 240, label: "SATUAN" },
        tenths_place:  { x: 600, y: 240, w: 224, h: 240, label: "PERSEPULUHAN" },
        hundredths_place: { x: 849, y: 240, w: 197, h: 240, label: "PERSERATUSAN" }
    };
    
    let blocks = [];  let historyStack = []; let draggingBlock = null;
    let targetNumber = 0; let showCelebration = false;

    const clearRect = { x: 50, y: 700, w: 100, h: 50 };
    const undoRect = { x: 1035, y: 16, w: 150, h: 66 };
    const nextRect = { x: 178, y: 700, w: 100, h: 50 };
    
    const sourceBlocks = [
        { type: "puluhan", val: 10, x: 50, y: 50, w: 80, h: 80 },
        { type: "satuan", val: 1, x: 215, y: 50, w: 80, h: 80 },
        { type: "persepuluh", val: 0.1, x: 390, y: 50, w: 30, h: 100 },
        { type: "perseratus", val: 0.01, x: 480, y: 80, w: 40, h: 40 }
    ];

    function saveToHistory() { historyStack.push(blocks.map(b => ({...b}))); }
    function undo() { if (historyStack.length) { blocks = historyStack.pop(); showCelebration = false; } }
    function clearAll() { saveToHistory(); blocks = []; showCelebration = false; }
    function newQuestion() { 
        saveToHistory(); blocks = [];
        targetNumber = Math.round((Math.floor(Math.random() * 9999) + 1) / 100 * 100) / 100;
        showCelebration = false;
    }

    function onMouseDown(e) {
        const rect = canvas.getBoundingClientRect();

        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
    
        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        if (mx > clearRect.x && mx < clearRect.x+clearRect.w && my > clearRect.y && my < clearRect.y+clearRect.h) return clearAll();
        if (mx > undoRect.x && mx < undoRect.x+undoRect.w && my > undoRect.y && my < undoRect.y+undoRect.h) return undo();
        if (mx > nextRect.x && mx < nextRect.x+nextRect.w && my > nextRect.y && my < nextRect.y+nextRect.h) return newQuestion();
        
        const sb = sourceBlocks.find(s => mx >= s.x && mx <= s.x+s.w && my >= s.y && my <= s.y+s.h);
        if (sb) draggingBlock = { ...sb, ox: mx-sb.x, oy: my-sb.y, cx: mx-sb.w/2, cy: my-sb.h/2 };
    }

    function onMouseMove(e) {
        if (!draggingBlock) return;
        const rect = canvas.getBoundingClientRect();
        draggingBlock.cx = (e.clientX - rect.left) * (canvas.width/rect.width) - draggingBlock.w/2;
        draggingBlock.cy = (e.clientY - rect.top) * (canvas.height/rect.height) - draggingBlock.h/2;
    }

    function onMouseUp(e) {
        if (!draggingBlock) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width/rect.width);
        const my = (e.clientY - rect.top) * (canvas.height/rect.height);
        
        for (let [key, col] of Object.entries(placeColumns)) {
            if (mx >= col.x && mx <= col.x+col.w && my >= col.y && my <= col.y+col.h) {
                saveToHistory();
                const count = blocks.filter(b => b.colKey === key).length;
                blocks.push({
                    type: draggingBlock.type, val: draggingBlock.val, w: draggingBlock.w, h: draggingBlock.h,
                    colKey: key, x: col.x + 20 + (count % 4) * 35, y: col.y + 60 + Math.floor(count/4) * 40
                });
                break;
            }
        }
        draggingBlock = null;
    }

    canvas.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fdf8ed"; ctx.fillRect(0,0,canvas.width,canvas.height);

        // Header & Target (Angka yang diminta)
        ctx.fillStyle = "#2c3a2b"; ctx.font = "bold 30px 'Segoe UI'";
        ctx.fillText("Representasikan:", 550, 85);
        ctx.font = "bold 48px 'Courier New'"; ctx.fillStyle = "#1b4d3e";
        ctx.fillText(targetNumber.toFixed(2).replace('.',','), 790, 140);

        // --- FITUR PENGHITUNG OTOMATIS ---
        const currentTotal = Math.round(blocks.reduce((sum, b) => sum + b.val, 0) * 100) / 100;
        ctx.fillStyle = "#5c3e1f"; ctx.font = "bold 24px 'Segoe UI'";
        ctx.fillText("Total di Papan:", 100, 205); 
        
        // Warna berubah jadi Hijau jika sudah benar, Orange jika belum pas
        ctx.fillStyle = (Math.abs(currentTotal - targetNumber) < 0.001) ? "#27ae60" : "#d35400";
        ctx.font = "bold 32px 'Courier New'";
        ctx.fillText(currentTotal.toFixed(2).replace('.', ','), 310, 207);

        // Kolom Nilai Tempat
        for (let [key, col] of Object.entries(placeColumns)) {
            ctx.fillStyle = "#fef0cf"; ctx.fillRect(col.x, col.y, col.w, col.h);
            ctx.strokeStyle = "#d4b87a"; ctx.strokeRect(col.x, col.y, col.w, col.h);
            ctx.fillStyle = "#7c5d3e"; ctx.font = "bold 18px 'Segoe UI'";
            ctx.fillText(col.label, col.x+10, col.y+30);
        }

        // Koma (Posisi di antara Satuan dan Persepuluhan)
        ctx.fillStyle = "#bd7a42"; ctx.beginPath(); ctx.arc(574, 318, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.fillText(",", 568, 327);

        // Gambar Blok
        blocks.forEach(b => drawImg(ctx, b.type, b.x, b.y, b.w, b.h));
        sourceBlocks.forEach(s => drawImg(ctx, s.type, s.x, s.y, s.w, s.h));
        
        // Tambahkan Label di bawah gambar
        ctx.fillStyle = "#5c3e1f";
        ctx.font = "bold 14px 'Segoe UI'";
        ctx.textAlign = "center";
    
        // Tentukan teks label berdasarkan tipe
        let labelText = "";
        if (s.type === "puluhan") labelText = "Puluhan";
        else if (s.type === "satuan") labelText = "Satuan";
        else if (s.type === "persepuluh") labelText = "Sepersepuluhan";
        else if (s.type === "perseratus") labelText = "Seperseratusan";

        // Gambar teks di tengah-tengah posisi blok (s.x + lebar/2)
        ctx.fillText(labelText, s.x + (s.w / 2), s.y + s.h + 20);
    
        // Kembalikan textAlign ke awal agar tidak merusak teks lain
        ctx.textAlign = "left";
        
        if (draggingBlock) drawImg(ctx, draggingBlock.type, draggingBlock.cx, draggingBlock.cy, draggingBlock.w, draggingBlock.h);

        // Tombol-Tombol
        ctx.font = "bold 28px 'Segoe UI'";
        ctx.fillStyle = "#587b3e"; ctx.fillRect(clearRect.x, clearRect.y, clearRect.w, clearRect.h);
        ctx.fillStyle = "white"; ctx.fillText("Clear", clearRect.x+15, clearRect.y+38);

        ctx.fillStyle = "#b17e55"; ctx.fillRect(undoRect.x, undoRect.y, undoRect.w, undoRect.h);
        ctx.fillStyle = "white"; ctx.fillText("Undo", undoRect.x+40, undoRect.y+43);

        ctx.fillStyle = "#3f729b"; ctx.fillRect(nextRect.x, nextRect.y, nextRect.w, nextRect.h);
        ctx.fillStyle = "white"; ctx.fillText("Next", nextRect.x+20, nextRect.y+38);

        // Selebrasi jika benar
        if (Math.abs(currentTotal - targetNumber) < 0.001) {
            ctx.fillStyle = "#e67e22"; ctx.font = "bold 40px 'Segoe UI'";
            ctx.fillText("🎉 BENAR! 🎉", 500, 560);
        }

        requestAnimationFrame(draw);
    }
    // --- BRIDGE UNTUK TOUCH SCREEN (HP) ---
    function handleTouch(e) {
        if (e.touches.length > 1) return; // Abaikan jika lebih dari 1 jari
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent({
            touchstart: "mousedown",
            touchmove: "mousemove",
            touchend: "mouseup"
        }[e.type], {
            clientX: touch.clientX,
            clientY: touch.clientY
        });
        canvas.dispatchEvent(mouseEvent);
        if (e.type !== "touchend") e.preventDefault(); 
    }

    // Daftarkan event touch ke canvas
    canvas.addEventListener("touchstart", handleTouch, { passive: false });
    window.addEventListener("touchmove", handleTouch, { passive: false });
    window.addEventListener("touchend", handleTouch, { passive: false });
    
    function init() { newQuestion(); draw(); }
})();
</script>
</body>
</html>
