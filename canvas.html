<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini Paint</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #f0f0f0;
            margin: 0;
            padding: 10px;
            touch-action: pan-y pinch-zoom; /* Allow vertical scroll only */
        }
        .toolbar { 
            margin: 10px; 
            padding: 10px; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        canvas { 
            border: 2px solid #333; 
            background: #fff; 
            cursor: crosshair;
            touch-action: none; /* Prevents page scroll while drawing on canvas */
            max-width: 100%;
            height: auto;
        }
        button { 
            padding: 10px 20px; 
            margin: 0; 
            cursor: pointer; 
            border: 1px solid #ccc; 
            background: #eee;
            font-size: 16px;
            touch-action: manipulation; /* Optimize for touch */
        }
        button.active { 
            background: #ff4444; 
            color: white; 
            border-color: #cc0000; 
        }
        h2 { margin: 10px 0; }
    </style>
</head>
<body>

    <h2>Mini Paint</h2>

    <div class="toolbar">
        <button onclick="setTool('line')" id="lineBtn">Garis</button>
        <button onclick="setTool('oval')" id="ovalBtn">Oval</button>
        <button onclick="setTool('eraser')" id="eraserBtn">Penghapus</button>
        <button onclick="clearCanvas()" style="margin-left: 20px;">Reset</button>
    </div>

    <canvas id="mainCanvas" width="800" height="500"></canvas>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        
        let tool = 'line';
        let isDrawing = false;
        let startX, startY;
        let snapshot; // To store the canvas state before drawing a new shape
        
        // For eraser continuous drawing
        let lastX, lastY;

        // Initialize button state
        document.getElementById('lineBtn').classList.add('active');

        function setTool(newTool) {
            tool = newTool;
            document.querySelectorAll('.toolbar button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(newTool + 'Btn').classList.add('active');
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Helper: Get canvas coordinates from mouse or touch event
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            
            if (e.touches) {
                // Touch event
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                // Mouse event
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            // Scale coordinates if canvas is visually resized (CSS max-width)
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            
            // Clamp to canvas boundaries
            canvasX = Math.min(Math.max(0, canvasX), canvas.width);
            canvasY = Math.min(Math.max(0, canvasY), canvas.height);
            
            return { x: canvasX, y: canvasY };
        }

        // Unified start handler
        function onDrawStart(e) {
            e.preventDefault(); // Prevent default touch behavior
            
            const { x, y } = getCanvasCoords(e);
            startX = x;
            startY = y;
            lastX = x;
            lastY = y;
            isDrawing = true;
            
            // Save current canvas state for shape preview
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            // For eraser: draw a single dot at start position
            if (tool === 'eraser') {
                ctx.save();
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = '#ffffff';
                ctx.fillStyle = '#ffffff';
                ctx.lineWidth = 20;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                // Update snapshot so eraser strokes are permanent
                snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }
        }

        // Unified move handler
        function onDrawMove(e) {
            if (!isDrawing) return;
            
            e.preventDefault(); // Prevent scrolling while drawing
            
            const { x, y } = getCanvasCoords(e);
            
            if (tool === 'line' || tool === 'oval') {
                // Restore to snapshot (clears previous preview)
                ctx.putImageData(snapshot, 0, 0);
                
                ctx.beginPath();
                ctx.strokeStyle = tool === 'line' ? 'black' : 'red';
                ctx.lineWidth = 2;
                
                if (tool === 'line') {
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } 
                else if (tool === 'oval') {
                    let radiusX = Math.abs(x - startX) / 2;
                    let radiusY = Math.abs(y - startY) / 2;
                    let centerX = startX + (x - startX) / 2;
                    let centerY = startY + (y - startY) / 2;
                    ctx.ellipse(centerX, centerY, radiusX, radiusY, 0, 0, 2 * Math.PI);
                    ctx.stroke();
                }
            } 
            else if (tool === 'eraser') {
                // Draw line from last position to current position
                ctx.save();
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = '#ffffff';
                ctx.fillStyle = '#ffffff';
                ctx.lineWidth = 20;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                // Also draw a dot at current position for smoothness
                ctx.beginPath();
                ctx.arc(x, y, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                
                // Update snapshot continuously for eraser
                snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
                lastX = x;
                lastY = y;
            }
        }

        // Unified end handler
        function onDrawEnd(e) {
            if (!isDrawing) return;
            
            if (tool === 'line' || tool === 'oval') {
                // Finalize the shape: commit the preview to permanent state
                // (The preview is already drawn, but we need to save it as the new snapshot)
                snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }
            
            isDrawing = false;
        }

        // === MOUSE EVENTS ===
        canvas.addEventListener('mousedown', onDrawStart);
        canvas.addEventListener('mousemove', onDrawMove);
        canvas.addEventListener('mouseup', onDrawEnd);

        // === TOUCH EVENTS ===
        canvas.addEventListener('touchstart', onDrawStart, { passive: false });
        canvas.addEventListener('touchmove', onDrawMove, { passive: false });
        canvas.addEventListener('touchend', onDrawEnd);
        canvas.addEventListener('touchcancel', onDrawEnd);

        // Optional: Draw a small demo shape to show it works
        ctx.strokeStyle = '#ccc';
        ctx.lineWidth = 1;
        ctx.strokeRect(10, 10, 100, 60);
    </script>
</body>
</html>
