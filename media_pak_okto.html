<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Aktivitas 3D: Kubus & Balok (Pro Mode)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            touch-action: none; /* Mencegah default gesture browser mobile */
        }
        
        /* Panel kontrol utama - Dibuat lebih ringkas, melayang di sisi kiri/bawah */
        .control-panel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 16px;
            padding: 0;
            color: white;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: auto;
            overflow: hidden;
        }
        
        /* Header panel - Lebih tipis */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: rgba(0,0,0,0.4);
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .panel-header h3 {
            margin: 0;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toggle-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 20px;
            padding: 4px 10px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .toggle-btn:hover { background: rgba(255,255,255,0.3); }
        
        /* Konten panel - Padding diperkecil agar compact */
        .panel-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .panel-content.collapsed { display: none; }
        
        /* Baris Pengaturan */
        .panel-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
        }
        
        /* Grup Kontrol - Desain minimalis tanpa border tebal */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: rgba(0,0,0,0.3);
            padding: 6px 10px;
            border-radius: 10px;
            flex: 1;
            min-width: 120px;
        }
        .control-group label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #aaa;
            text-transform: uppercase;
        }
        
        /* Pilihan Mode Alat Aktif */
        .mode-selector {
            display: flex;
            gap: 4px;
            width: 100%;
        }
        .mode-btn {
            flex: 1;
            background: #233342;
            border: 1.5px solid transparent;
            padding: 6px 4px;
            border-radius: 8px;
            color: #a0b0b2;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.2;
        }
        .mode-btn .sub-text {
            display: none; /* Sembunyikan penjelasan panjang di mobile agar compact */
        }
        .mode-btn.active {
            color: white;
            border-color: #ffffff;
        }
        .mode-btn#modeSalin.active { background: #27ae60; }
        .mode-btn#modeRotasi.active { background: #8e44ad; }
        .mode-btn#modeHapus.active { background: #c0392b; }
        
        input, button {
            background: #1e2f3a;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s ease;
        }
        input {
            background: #0f1a22;
            cursor: text;
            width: 40px;
            text-align: center;
            padding: 6px 4px;
        }
        
        /* Warna Aksen Tombol */
        .btn-kubus { background: #27ae60; }
        .btn-balok { background: #2980b9; }
        .btn-action { background: #e67e22; font-size: 11px; padding: 6px 10px; }
        .btn-reset-all { background: #7f8c8d; font-size: 11px; padding: 6px 10px; }
        
        button:active, .mode-btn:active { transform: scale(0.97); }
        
        /* Status di atas - Dibuat mengambang minimalis */
        #status {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 64px;
            background: rgba(10, 10, 25, 0.88);
            padding: 8px 12px;
            border-radius: 12px;
            color: #eee;
            font-size: 11px;
            pointer-events: none;
            z-index: 15;
            backdrop-filter: blur(8px);
            text-align: left;
            border: 1px solid rgba(255,255,255,0.1);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Tombol Crosshair */
        #btnCrosshair {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(10, 10, 25, 0.88);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            padding: 0;
        }
        #btnCrosshair:hover { background: rgba(35, 50, 70, 0.9); border-color: white; }
        
        /* Panel Modifikasi Sekunder */
        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .color-spectrum {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 32px;
            height: 28px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            background: none;
            cursor: pointer;
            padding: 0;
        }
        .color-spectrum::-webkit-color-swatch-wrapper { padding: 0; }
        .color-spectrum::-webkit-color-swatch { border: none; border-radius: 5px; }
        .color-spectrum::-moz-color-swatch { border: none; border-radius: 5px; }

        .scale-btn-group {
            display: flex;
            gap: 4px;
        }
        .scale-btn-group button {
            flex: 1;
            padding: 6px 8px;
            font-size: 11px;
            border-radius: 6px;
        }
        
        .balok-inputs { display: flex; gap: 4px; align-items: center; }
        .balok-inputs input { flex: 1; min-width: 30px; }

        /* Responsif Layout Desktop - Memindahkan panel ke SISI KIRI agar Workspace LUAS */
        @media (min-width: 768px) {
            .control-panel { 
                top: 65px; 
                left: 12px; 
                bottom: auto; 
                width: 320px; 
                right: auto;
                border-radius: 14px;
            }
            .panel-header h3 { font-size: 0.9rem; }
            .panel-content { max-height: calc(100vh - 100px); gap: 12px; }
            .panel-row { flex-wrap: wrap; }
            .control-group { flex: none; width: 100%; }
            .mode-selector { width: 100%; }
            .mode-btn .sub-text { display: inline; } /* Tampilkan sub-text panduan di desktop */
            input { width: 45px; }
            
            #status {
                right: 64px;
                left: 12px;
                max-width: calc(100% - 80px);
            }
        }
    </style>
</head>
<body>
    <div id="status">✨ Memuat ruang geometri...</div>

    <!-- Tombol Crosshair -->
    <button id="btnCrosshair" title="Reset Posisi Kamera">🎯</button>
    
    <div class="control-panel" id="mainPanel">
        <div class="panel-header" id="panelHeader">
            <h3>
                <span>🧩 Panel Kontrol</span>
            </h3>
            <button class="toggle-btn" id="togglePanelBtn">▼ Sembunyikan</button>
        </div>
        
        <div class="panel-content" id="panelContent">
            <!-- Baris 1: Pilihan Mode Alat -->
            <div class="panel-row">
                <div class="control-group">
                    <label>🛠️ Mode Alat Aktif</label>
                    <div class="mode-selector">
                        <div id="modeSalin" class="mode-btn active">🌿 Salin<span class="sub-text"><br><span style="font-size:8px;font-weight:normal;">Double-tap sisi</span></span></div>
                        <div id="modeRotasi" class="mode-btn">🔄 Rotasi<span class="sub-text"><br><span style="font-size:8px;font-weight:normal;">Ubah putaran</span></span></div>
                        <div id="modeHapus" class="mode-btn">🗑️ Hapus<span class="sub-text"><br><span style="font-size:8px;font-weight:normal;">Double-tap objek</span></span></div>
                    </div>
                </div>
                <div class="control-group" id="subPanelRotasi" style="display: none; align-items: center;">
                    <label>⚙️ Kontrol Rotasi</label>
                    <button id="btnResetRotasi" class="btn-action" style="width: 100%;">↩️ Reset Rotasi</button>
                </div>
            </div>

            <!-- Baris 2: Modifikasi Objek Terpilih (Warna & Skala) -->
            <div class="panel-row" id="panelModifikasiObjek" style="background: rgba(255,255,255,0.04); padding: 6px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.1);">
                <div class="control-group" style="background: none; padding: 2px 4px;">
                    <label>🎨 Warna Objek Aktif</label>
                    <div class="color-picker-container">
                        <input type="color" id="pickerWarna" class="color-spectrum" value="#ffffff">
                        <span id="labelWarna" style="font-size: 10px; font-family: monospace; color: #aaa;">#------</span>
                    </div>
                </div>
                <div class="control-group" style="background: none; padding: 2px 4px;">
                    <label>📐 Ukuran (Rasio Tetap)</label>
                    <div class="scale-btn-group">
                        <button id="btnScaleDown" class="btn-action" style="background: #c0392b;">➖ Kecil</button>
                        <button id="btnScaleUp" class="btn-action" style="background: #27ae60;">➕ Besar</button>
                    </div>
                </div>
            </div>
            
            <!-- Baris 3: Tambah Objek -->
            <div class="panel-row">
                <div class="control-group">
                    <label>➕ Buat Objek Baru</label>
                    <div style="display: flex; gap: 6px; width: 100%;">
                        <button id="btnTambahKubus" class="btn-kubus" style="flex: 1; font-size: 11px; padding: 8px 4px;">+ Kubus</button>
                        <div class="balok-inputs" style="flex: 2; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 20px;">
                            <input type="number" id="panjangX" value="2" step="0.5" min="0.5" max="5" title="Panjang (X)">
                            <input type="number" id="panjangY" value="1" step="0.5" min="0.5" max="5" title="Tinggi (Y)">
                            <input type="number" id="panjangZ" value="1" step="0.5" min="0.5" max="5" title="Lebar (Z)">
                            <button id="btnTambahBalok" class="btn-balok" style="font-size: 11px; padding: 6px 8px;">+ Balok</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Baris 4: Reset All -->
            <div class="panel-row" style="justify-content: flex-end;">
                <button id="btnReset" class="btn-reset-all" style="width: 100%; padding: 6px 0; border-radius: 10px;">🗑️ Kosongkan Ruang (Reset All)</button>
            </div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- Konstanta Posisi Kamera Awal ---
        const POSISI_KAMERA_AWAL = new THREE.Vector3(6, 6, 8);
        const TARGET_KAMERA_AWAL = new THREE.Vector3(0, 1, 0);

        // --- Variabel State Aplikasi ---
        let currentMode = 'salin'; 
        let objectsList = [];
        let currentAttachedObject = null;

        // --- Setup Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.01);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.copy(POSISI_KAMERA_AWAL);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);
        
        // --- OrbitControls (Kamera) ---
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;
        orbitControls.target.copy(TARGET_KAMERA_AWAL);
        
        // --- TransformControls (Gizmo) ---
        const transformControls = new TransformControls(camera, renderer.domElement);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        transformControls.setSize(isMobile ? 1.1 : 0.85); // Sedikit diperkecil agar tidak mengganggu pandangan

        transformControls.addEventListener('dragging-changed', function (event) {
            orbitControls.enabled = !event.value;
        });
        scene.add(transformControls);
        
        // --- Pencahayaan ---
        const ambientLight = new THREE.AmbientLight(0x505070);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(6, 12, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x5588aa, 0.5);
        fillLight.position.set(3, 5, 4);
        scene.add(fillLight);
        
        // Grid & Lantai dasar
        const gridHelper = new THREE.GridHelper(20, 20, 0x88aaff, 0x446688);
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(20, 20),
            new THREE.MeshStandardMaterial({ color: 0x112244, roughness: 0.6 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.01;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- DOM Elemen Fitur ---
        const pickerWarna = document.getElementById('pickerWarna');
        const labelWarna = document.getElementById('labelWarna');
        const panelModifikasi = document.getElementById('panelModifikasiObjek');

        // --- Fungsi Manajemen Seleksi Objek ---
        function detachTransformControls() {
            if (currentAttachedObject) {
                transformControls.detach();
                currentAttachedObject = null;
                perbaruiPanelModifikasi();
            }
        }
        
        function attachToObject(mesh) {
            detachTransformControls();
            if (currentMode === 'rotasi') {
                transformControls.setMode('rotate');
            } else {
                transformControls.setMode('translate');
            }
            transformControls.attach(mesh);
            currentAttachedObject = mesh;
            perbaruiPanelModifikasi();
        }
        
        function randomColor() {
            return new THREE.Color().setHSL(Math.random(), 0.8, 0.55);
        }

        function perbaruiPanelModifikasi() {
            if (currentAttachedObject) {
                panelModifikasi.style.opacity = "1";
                panelModifikasi.style.pointerEvents = "auto";
                const hexWarna = "#" + currentAttachedObject.material.color.getHexString();
                pickerWarna.value = hexWarna;
                labelWarna.innerText = hexWarna.toUpperCase();
            } else {
                panelModifikasi.style.opacity = "0.3";
                panelModifikasi.style.pointerEvents = "none";
                labelWarna.innerText = "#------";
            }
        }
        
        // --- Konstruktor Pembuatan Kubus/Balok ---
        function buatMeshBox(w, h, d, posisi = null, warnaSama = null) {
            const geometry = new THREE.BoxGeometry(w, h, d);
            const material = new THREE.MeshStandardMaterial({ 
                color: warnaSama ? warnaSama.clone() : randomColor(), 
                roughness: 0.3, 
                metalness: 0.1 
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { w: w, h: h, d: d };
            
            if (posisi) {
                mesh.position.copy(posisi);
            } else {
                mesh.position.set((Math.random() - 0.5) * 3, h / 2, (Math.random() - 0.5) * 3);
            }
            
            scene.add(mesh);
            objectsList.push(mesh);
            attachToObject(mesh);
            return mesh;
        }

        // --- ENGINE INTERAKSI ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        function eksekusiAksiObjek(clientX, clientY, isDoubleClick = false) {
            // Mencegah klik tembus jika menyentuh UI panel kontrol luar workspace
            if (document.getElementById('mainPanel').contains(document.elementFromPoint(clientX, clientY))) return;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objectsList);
            
            if (intersects.length > 0) {
                const hit = intersects[0];
                const objekTarget = hit.object;
                
                if (!isDoubleClick) {
                    if (currentMode !== 'hapus') {
                        attachToObject(objekTarget);
                    } else {
                        currentAttachedObject = objekTarget;
                        transformControls.detach();
                        perbaruiPanelModifikasi();
                    }
                    return;
                }
                
                if (currentMode === 'hapus') {
                    detachTransformControls();
                    scene.remove(objekTarget);
                    objekTarget.geometry.dispose();
                    objekTarget.material.dispose();
                    objectsList = objectsList.filter(item => item !== objekTarget);
                    return;
                }
                
                if (currentMode === 'rotasi') {
                    objekTarget.rotation.set(0, 0, 0);
                    return;
                }
                
                if (currentMode === 'salin') {
                    const normalSisi = hit.face.normal.clone();
                    normalSisi.transformDirection(objekTarget.matrixWorld);
                    
                    const skalaX = objekTarget.scale.x;
                    const skalaY = objekTarget.scale.y;
                    const skalaZ = objekTarget.scale.z;

                    const w = objekTarget.userData.w * skalaX;
                    const h = objekTarget.userData.h * skalaY;
                    const d = objekTarget.userData.d * skalaZ;
                    
                    const posisiBaru = objekTarget.position.clone();
                    
                    if (Math.abs(normalSisi.x) > 0.8) posisiBaru.x += normalSisi.x * w; 
                    else if (Math.abs(normalSisi.y) > 0.8) posisiBaru.y += normalSisi.y * h;
                    else if (Math.abs(normalSisi.z) > 0.8) posisiBaru.z += normalSisi.z * d;
                    
                    if (posisiBaru.y < h/2) posisiBaru.y = h/2;
                    
                    const boxBaru = buatMeshBox(objekTarget.userData.w, objekTarget.userData.h, objekTarget.userData.d, posisiBaru, objekTarget.material.color);
                    boxBaru.scale.set(skalaX, skalaY, skalaZ);
                }
                
            } else {
                if (!transformControls.dragging) {
                    detachTransformControls();
                }
            }
        }
        
        let lastTapTime = 0;
        let touchStartX = 0;
        let touchStartY = 0;

        renderer.domElement.addEventListener('click', (e) => eksekusiAksiObjek(e.clientX, e.clientY, false));
        renderer.domElement.addEventListener('dblclick', (e) => eksekusiAksiObjek(e.clientX, e.clientY, true));

        renderer.domElement.addEventListener('touchstart', (e) => {
            if(e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            }
        }, {passive: true});

        renderer.domElement.addEventListener('touchend', (e) => {
            if (e.changedTouches.length === 1) {
                const touchEndX = e.changedTouches[0].clientX;
                const touchEndY = e.changedTouches[0].clientY;
                
                if (Math.abs(touchEndX - touchStartX) < 6 && Math.abs(touchEndY - touchStartY) < 6) {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTapTime;
                    
                    if (tapLength < 300 && tapLength > 0) {
                        eksekusiAksiObjek(touchEndX, touchEndY, true);
                        e.preventDefault();
                    } else {
                        eksekusiAksiObjek(touchEndX, touchEndY, false);
                    }
                    lastTapTime = currentTime;
                }
            }
        }, {passive: false});

        // --- Event Listener Fitur Utama ---
        document.getElementById('btnCrosshair').addEventListener('click', () => {
            camera.position.copy(POSISI_KAMERA_AWAL);
            orbitControls.target.copy(TARGET_KAMERA_AWAL);
            orbitControls.update();
        });

        pickerWarna.addEventListener('input', (e) => {
            if (currentAttachedObject) {
                const warnaHex = e.target.value;
                currentAttachedObject.material.color.set(warnaHex);
                labelWarna.innerText = warnaHex.toUpperCase();
            }
        });

        function ubahUkuranObjekProporsional(faktorSkala) {
            if (currentAttachedObject) {
                currentAttachedObject.scale.multiplyScalar(faktorSkala);
                const tinggiMurni = currentAttachedObject.userData.h;
                const tinggiSkalaSekarang = tinggiMurni * currentAttachedObject.scale.y;
                if (currentAttachedObject.position.y < tinggiSkalaSekarang / 2) {
                    currentAttachedObject.position.y = tinggiSkalaSekarang / 2;
                }
            }
        }

        document.getElementById('btnScaleUp').addEventListener('click', () => ubahUkuranObjekProporsional(1.2));
        document.getElementById('btnScaleDown').addEventListener('click', () => ubahUkuranObjekProporsional(0.8));

        const btnSalin = document.getElementById('modeSalin');
        const btnRotasi = document.getElementById('modeRotasi');
        const btnHapus = document.getElementById('modeHapus');
        const subPanelRotasi = document.getElementById('subPanelRotasi');
        
        function gantiModeAlat(modeTerpilih) {
            currentMode = modeTerpilih;
            btnSalin.classList.remove('active');
            btnRotasi.classList.remove('active');
            btnHapus.classList.remove('active');
            subPanelRotasi.style.display = "none";
            
            if (modeTerpilih === 'salin') {
                btnSalin.classList.add('active');
                if (currentAttachedObject) transformControls.setMode('translate');
            } else if (modeTerpilih === 'rotasi') {
                btnRotasi.classList.add('active');
                subPanelRotasi.style.display = "flex";
                if (currentAttachedObject) transformControls.setMode('rotate');
            } else if (modeTerpilih === 'hapus') {
                btnHapus.classList.add('active');
                detachTransformControls();
            }
        }
        
        btnSalin.addEventListener('click', () => gantiModeAlat('salin'));
        btnRotasi.addEventListener('click', () => gantiModeAlat('rotasi'));
        btnHapus.addEventListener('click', () => gantiModeAlat('hapus'));
        
        document.getElementById('btnResetRotasi').addEventListener('click', () => {
            if (currentAttachedObject) currentAttachedObject.rotation.set(0, 0, 0);
        });

        document.getElementById('btnTambahKubus').addEventListener('click', () => buatMeshBox(1, 1, 1));
        
        document.getElementById('btnTambahBalok').addEventListener('click', () => {
            const xVal = parseFloat(document.getElementById('panjangX').value) || 1;
            const yVal = parseFloat(document.getElementById('panjangY').value) || 1;
            const zVal = parseFloat(document.getElementById('panjangZ').value) || 1;
            buatMeshBox(xVal, yVal, zVal);
        });
        
        document.getElementById('btnReset').addEventListener('click', () => {
            if(confirm("Apakah Anda yakin ingin menghapus semua susunan bangun ruang?")) {
                detachTransformControls();
                objectsList.forEach(mesh => {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                });
                objectsList = [];
            }
        });
        
        const panelContentDiv = document.getElementById('panelContent');
        const toggleBtn = document.getElementById('togglePanelBtn');
        let panelCollapsed = false;
        
        toggleBtn.addEventListener('click', () => {
            panelCollapsed = !panelCollapsed;
            if (panelCollapsed) {
                panelContentDiv.classList.add('collapsed');
                toggleBtn.innerHTML = '▲ Tampilkan';
            } else {
                panelContentDiv.classList.remove('collapsed');
                toggleBtn.innerHTML = '▼ Sembunyikan';
            }
        });

        perbaruiPanelModifikasi();
        
        // --- Loop Animasi Utama ---
        function animate() {
            requestAnimationFrame(animate);
            orbitControls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        const statusDiv = document.getElementById('status');
        setInterval(() => {
            const count = objectsList.length;
            if (count === 0) {
                statusDiv.innerHTML = '✨ Ruang Kosong. Tambahkan kubus/balok untuk memulai.';
            } else {
                let pesanPanduan = '';
                if (currentMode === 'salin') pesanPanduan = '🌿 Salin Aktif: Pilih objek untuk warna/skala atau double-tap sisi.';
                else if (currentMode === 'rotasi') pesanPanduan = '🔄 Rotasi Aktif: Seret cincin gizmo objek.';
                else if (currentMode === 'hapus') pesanPanduan = '🗑️ Hapus Aktif: Double-tap objek untuk melenyapkan.';
                statusDiv.innerHTML = `📦 Objek: <b>${count}</b> | ${pesanPanduan}`;
            }
        }, 350);
    </script>
</body>
</html>
