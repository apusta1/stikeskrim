<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Belajar Menulis Huruf y</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #fef9f0;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px 16px;
            overflow-y: auto;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            color: #d97706;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #78716c;
            margin-bottom: 18px;
            text-align: center;
        }

        #canvas-container {
            position: relative;
            width: min(340px, 85vw);
            height: min(340px, 85vw);
            max-width: 340px;
            max-height: 340px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(217,119,6,0.13), 0 2px 8px rgba(0,0,0,0.07);
            border: 2.5px solid #fde68a;
        }

        #tracing-svg {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 26px;
            touch-action: none;
        }

        /* Garis Pandu */
        .guide-line { stroke-width: 2; }
        .guide-top-red { stroke: #ef4444; }
        .guide-mid-dashed-blue { stroke: #3b82f6; stroke-dasharray: 6 4; }
        .guide-mid-solid-blue { stroke: #3b82f6; }
        .guide-bottom-red { stroke: #ef4444; }

        .bg-path {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 34;
        }
        .bg-inactive { stroke: #e5e7eb; }
        .bg-active   { stroke: #fde68a; }

        .touch-area {
            fill: none;
            stroke: transparent;
            stroke-width: 68;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: stroke;
            cursor: pointer;
        }

        .trace-path {
            fill: none;
            stroke: #f59e0b;
            stroke-width: 28;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        /* Titik Mulai */
        .start-dot        { fill: #fbbf24; opacity: 0.9; }
        .start-dot-dim    { fill: #d1d5db; opacity: 0.6; }

        /* Label Angka */
        .num-label-bg     { fill: #f59e0b; }
        .num-label-bg-dim { fill: #9ca3af; }

        #progress-bar-wrap {
            margin-top: 18px;
            width: min(340px, 85vw);
            max-width: 340px;
            height: 10px;
            background: #fde68a;
            border-radius: 99px;
            overflow: hidden;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            border-radius: 99px;
            transition: width 0.1s linear;
        }

        #stroke-label {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #92400e;
            background: #fef3c7;
            border-radius: 20px;
            padding: 4px 16px;
        }

        #btn-reset {
            margin-top: 14px;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(245,158,11,0.3);
            transition: background 0.2s, transform 0.1s;
            min-height: 48px;
            min-width: 140px;
        }
        #btn-reset:hover  { background: #d97706; }
        #btn-reset:active { transform: scale(0.97); }

        #success-msg {
            display: none;
            font-size: 22px;
            font-weight: 700;
            color: #16a34a;
            margin-top: 14px;
            animation: popIn 0.4s cubic-bezier(.36,1.56,.64,1) both;
            text-align: center;
        }

        #voice-status {
            font-size: 11px;
            color: #a8a29e;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .voice-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #d4d4d8;
            display: inline-block;
        }
        .voice-dot.active { background-color: #22c55e; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
    </style>
</head>
<body>

<p class="title">✏️ Belajar Menulis Huruf y</p>
<p class="subtitle">Ikuti jejak untuk menulis huruf <strong>y</strong> (seperti pada contoh)</p>

<div id="canvas-container">
    <svg id="tracing-svg" viewBox="0 0 340 340" xmlns="http://www.w3.org/2000/svg">

        <line x1="0" y1="70" x2="340" y2="70" class="guide-line guide-top-red" />
        <line x1="0" y1="130" x2="340" y2="130" class="guide-line guide-mid-dashed-blue" />
        <line x1="0" y1="210" x2="340" y2="210" class="guide-line guide-mid-solid-blue" />
        <line x1="0" y1="290" x2="340" y2="290" class="guide-line guide-bottom-red" />

        <path id="bg-path-1" class="bg-path bg-active" d="M 115,130 L 160,210" />
        <path id="bg-path-2" class="bg-path bg-inactive" d="M 225,130 L 125,290" />

        <path id="touch-area-1" class="touch-area" d="M 115,130 L 160,210" />
        <path id="touch-area-2" class="touch-area" d="M 225,130 L 125,290" />

        <path id="active-path-1" class="trace-path" d="M 115,130 L 160,210" />
        <path id="active-path-2" class="trace-path" d="M 225,130 L 125,290" />

        <circle id="dot-1" class="start-dot" cx="115" cy="130" r="10"/>
        <g id="label-group-1">
            <circle class="num-label-bg" cx="95" cy="130" r="9"/>
            <text x="95" y="133.5" text-anchor="middle" font-size="11" font-weight="bold" fill="white" pointer-events="none">1</text>
        </g>

        <circle id="dot-2" class="start-dot-dim" cx="225" cy="130" r="10"/>
        <g id="label-group-2" opacity="0.5">
            <circle id="label-bg-2" class="num-label-bg-dim" cx="245" cy="130" r="9"/>
            <text x="245" y="133.5" text-anchor="middle" font-size="11" font-weight="bold" fill="white" pointer-events="none">2</text>
        </g>

        <text id="hand-guide" font-size="34" text-anchor="middle" dominant-baseline="middle" pointer-events="none" x="115" y="130">👆</text>
    </svg>
</div>

<div id="progress-bar-wrap">
    <div id="progress-bar"></div>
</div>

<div id="stroke-label">Langkah 1: Tarik garis miring kiri \</div>

<div id="success-msg">🎉 Hebat! Kamu berhasil!</div>

<button id="btn-reset">🔄 Coba Lagi</button>

<div id="voice-status">
    <span class="voice-dot" id="voice-dot"></span>
    <span id="voice-text">Suara bersiap</span>
</div>

<script>
    const svg          = document.getElementById('tracing-svg');
    const activePath1  = document.getElementById('active-path-1');
    const activePath2  = document.getElementById('active-path-2');
    const bgPath1      = document.getElementById('bg-path-1');
    const bgPath2      = document.getElementById('bg-path-2');
    const touchArea1   = document.getElementById('touch-area-1');
    const touchArea2   = document.getElementById('touch-area-2');
    const dot1         = document.getElementById('dot-1');
    const dot2         = document.getElementById('dot-2');
    const labelGroup2  = document.getElementById('label-group-2');
    const labelBg2     = document.getElementById('label-bg-2');
    const handGuide    = document.getElementById('hand-guide');
    const btnReset     = document.getElementById('btn-reset');
    const progressBar  = document.getElementById('progress-bar');
    const successMsg   = document.getElementById('success-msg');
    const strokeLabel  = document.getElementById('stroke-label');
    const voiceDot     = document.getElementById('voice-dot');
    const voiceText    = document.getElementById('voice-text');

    // Dapatkan panjang eksak jalur SVG
    let pathLength1 = activePath1.getTotalLength();
    let pathLength2 = activePath2.getTotalLength();

    // Inisialisasi awal dasharray agar menyembunyikan jalur goresan sebelum ditarik
    function initPathLengths() {
        pathLength1 = activePath1.getTotalLength();
        pathLength2 = activePath2.getTotalLength();
        
        activePath1.style.strokeDasharray  = pathLength1;
        activePath1.style.strokeDashoffset = pathLength1;
        activePath2.style.strokeDasharray  = pathLength2;
        activePath2.style.strokeDashoffset = pathLength2;
    }

    // State aplikasi
    let currentStroke = 1;
    let progress1 = 0, progress2 = 0;
    let isDrawing = false, completed = false;
    let speechReady = false, pendingSpeech = false;
    let guideVisible = true, guideStart = null;

    // Pengaturan Text to Speech suara "y"
    function initSpeech() {
        if (speechReady) return;
        if (!('speechSynthesis' in window)) { voiceText.textContent = 'Suara tidak didukung'; return; }
        speechReady = true;
        voiceDot.classList.add('active');
        voiceText.textContent = 'Suara siap ✅';
        if (pendingSpeech) { playSoundY(); pendingSpeech = false; }
    }
    function ensureSpeechReady() { if (!speechReady) initSpeech(); }
    
    function playSoundY() {
        if (!('speechSynthesis' in window)) return;
        if (!speechReady) { pendingSpeech = true; return; }
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance('ye');
        u.lang = 'id-ID'; u.rate = 0.75; u.pitch = 1.2;
        window.speechSynthesis.speak(u);
    }

    // Animasi pergerakan petunjuk tangan pembantu
    const GUIDE_DURATION = 2500;
    const GUIDE_FADE_END = 0.85;
    function animateHand(ts) {
        if (!guideVisible) return;
        if (!guideStart) guideStart = ts;
        const ap  = currentStroke === 1 ? activePath1 : activePath2;
        const len = currentStroke === 1 ? pathLength1  : pathLength2;
        const elapsed  = (ts - guideStart) % GUIDE_DURATION;
        const fraction = elapsed / GUIDE_DURATION;
        
        if (len > 0) {
            const pt = ap.getPointAtLength(fraction * len);
            handGuide.setAttribute('x', pt.x);
            handGuide.setAttribute('y', pt.y + 10);
        }
        
        if (fraction > GUIDE_FADE_END) {
            handGuide.style.opacity = 1 - (fraction - GUIDE_FADE_END) / (1 - GUIDE_FADE_END);
        } else if (fraction < 0.04) {
            handGuide.style.opacity = fraction / 0.04;
        } else {
            handGuide.style.opacity = 1;
        }
        requestAnimationFrame(animateHand);
    }

    function updatePathDrawing() {
        activePath1.style.strokeDashoffset = pathLength1 * (1 - progress1);
        activePath2.style.strokeDashoffset = pathLength2 * (1 - progress2);
        progressBar.style.width = ((progress1 * 0.45) + (progress2 * 0.55)) * 100 + '%';
    }

    function getSVGCoords(e) {
        const rect = svg.getBoundingClientRect();
        const src  = e.touches ? e.touches[0] : e;
        return {
            x: ((src.clientX - rect.left) / rect.width) * 340,
            y: ((src.clientY - rect.top) / rect.height) * 340
        };
    }

    const TOLERANCE = 55;
    const MAX_JUMP  = 0.25;

    function checkTracing(e) {
        if (!isDrawing || completed) return;

        const { x, y } = getSVGCoords(e);
        const ap     = currentStroke === 1 ? activePath1 : activePath2;
        const pLen   = currentStroke === 1 ? pathLength1  : pathLength2;
        const prog   = currentStroke === 1 ? progress1    : progress2;

        const anchorLen = prog * pLen;
        const searchLen = Math.min(pLen, anchorLen + MAX_JUMP * pLen);
        let bestLen = -1, bestDist = Infinity;

        // Cari titik terdekat sepanjang garis lintasan
        for (let i = 0; i <= 40; i++) {
            const tLen = anchorLen + (searchLen - anchorLen) * (i / 40);
            const pt   = ap.getPointAtLength(tLen);
            const d    = Math.hypot(x - pt.x, y - pt.y);
            if (d < bestDist) { bestDist = d; bestLen = tLen; }
        }

        if (bestDist <= TOLERANCE && bestLen > anchorLen) {
            if (currentStroke === 1) progress1 = bestLen / pLen;
            else                     progress2 = bestLen / pLen;
            updatePathDrawing();

            const curProg = currentStroke === 1 ? progress1 : progress2;
            if (guideVisible && curProg > 0.02) {
                guideVisible = false;
                handGuide.style.opacity = '0';
            }
            if (navigator.vibrate && Math.floor(curProg * 10) !== Math.floor((curProg - 0.01) * 10)) {
                navigator.vibrate(8);
            }
        }

        const curProg = currentStroke === 1 ? progress1 : progress2;
        if (curProg >= 0.95 && !completed) {
            if (currentStroke === 1) {
                progress1 = 1.0;
                updatePathDrawing();
                currentStroke = 2;
                isDrawing = false;

                // Transisi aktif ke goresan langkah kedua
                dot1.style.opacity = '0.35';
                dot2.setAttribute('class', 'start-dot');
                labelGroup2.setAttribute('opacity', '1');
                labelBg2.setAttribute('class', 'num-label-bg');
                bgPath2.setAttribute('class', 'bg-path bg-active');

                const sp = activePath2.getPointAtLength(0);
                handGuide.setAttribute('x', sp.x);
                handGuide.setAttribute('y', sp.y + 10);
                handGuide.style.opacity = '1';
                guideVisible = true; guideStart = null;
                requestAnimationFrame(animateHand);

                strokeLabel.textContent = 'Langkah 2: Tarik garis miring kanan panjang /';
                if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
            } else {
                progress2 = 1.0;
                updatePathDrawing();
                completed = true; isDrawing = false;
                handleSuccess();
            }
        }
    }

    function handleSuccess() {
        playSoundY();
        if (navigator.vibrate) navigator.vibrate([50, 100, 50]);
        confetti({ particleCount: 160, spread: 90, origin: { y: 0.55 }, colors: ['#fbbf24','#f59e0b','#10b981','#3b82f6'] });
        successMsg.style.display = 'block';
        strokeLabel.textContent = '✅ Yay! Kamu berhasil!';
    }

    function startDraw(e) {
        if (completed) return;
        e.preventDefault();
        isDrawing = true;
        ensureSpeechReady();
        checkTracing(e);
    }
    function endDraw() { isDrawing = false; }

    // Pasang Event Listener Interaktivitas
    touchArea1.addEventListener('mousedown',  startDraw);
    touchArea1.addEventListener('mousemove',  checkTracing);
    touchArea1.addEventListener('touchstart', startDraw, { passive: false });
    touchArea1.addEventListener('touchmove',  checkTracing, { passive: false });

    touchArea2.addEventListener('mousedown',  startDraw);
    touchArea2.addEventListener('mousemove',  checkTracing);
    touchArea2.addEventListener('touchstart', startDraw, { passive: false });
    touchArea2.addEventListener('touchmove',  checkTracing, { passive: false });

    window.addEventListener('mouseup',  endDraw);
    window.addEventListener('touchend', endDraw);

    // Fungsi Reset Tombol Coba Lagi
    btnReset.addEventListener('click', () => {
        ensureSpeechReady();
        currentStroke = 1;
        progress1 = 0; progress2 = 0;
        completed = false; isDrawing = false;
        
        initPathLengths();
        updatePathDrawing();

        dot1.style.opacity = '0.9';
        dot1.setAttribute('class', 'start-dot');
        dot2.setAttribute('class', 'start-dot-dim');
        
        labelGroup2.setAttribute('opacity', '0.5');
        labelBg2.setAttribute('class', 'num-label-bg-dim');
        
        bgPath1.setAttribute('class', 'bg-path bg-active');
        bgPath2.setAttribute('class', 'bg-path bg-inactive');

        guideVisible = true; guideStart = null;
        handGuide.style.opacity = '1';
        const sp = activePath1.getPointAtLength(0);
        handGuide.setAttribute('x', sp.x);
        handGuide.setAttribute('y', sp.y + 10);
        requestAnimationFrame(animateHand);

        successMsg.style.display = 'none';
        strokeLabel.textContent = 'Langkah 1: Tarik garis miring kiri \\';
    });

    document.body.addEventListener('touchstart', ensureSpeechReady, { once: true });
    document.body.addEventListener('mousedown',  ensureSpeechReady, { once: true });

    // Jalankan inisialisasi awal saat window dimuat
    window.addEventListener('load', () => {
        initPathLengths();
        updatePathDrawing();
        requestAnimationFrame(animateHand);
    });
    
    // Fallback jika window sudah termuat
    initPathLengths();
    updatePathDrawing();
    requestAnimationFrame(animateHand);
</script>
</body>
</html>
